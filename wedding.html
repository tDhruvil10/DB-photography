<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Photography - DB Photography</title>
    <meta name="description" content="Wedding photography portfolio by DB Photography">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f8f9fa;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
            text-decoration: none;
        }

        .back-link {
            color: #e74c3c;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link:hover {
            color: #c0392b;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 100px auto 2rem;
            padding: 0 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            color: #2c3e50;
        }

        .drive-embed {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .gallery-container {
                margin-top: 80px;
                padding: 0 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .drive-embed {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">DB Photography</a>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Back to Portfolio
            </a>
        </nav>
    </header>

    <div class="gallery-container">
        <h1>Wedding Moments</h1>
        <iframe
            src="https://drive.google.com/embeddedfolderview?id=1kUaXTyyXgR9hNK3gX8bAmHFAIfSopHsq#grid"
            class="drive-embed"
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
