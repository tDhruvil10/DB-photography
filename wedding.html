<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Photography - DB Photography</title>
    <meta name="description" content="Wedding photography portfolio by DB Photography">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f8f9fa;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #2c3e50;
            text-decoration: none;
        }

        .back-link {
            color: #e74c3c;
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link:hover {
            color: #c0392b;
        }

        .gallery-container {
            max-width: 1200px;
            margin: 100px auto 2rem;
            padding: 0 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 2rem;
            color: #2c3e50;
        }

        .drive-embed {
            width: 100%;
            height: 600px;
            border: none;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .gallery-container {
                margin-top: 80px;
                padding: 0 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .drive-embed {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">DB Photography</a>
            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                Back to Portfolio
            </a>
        </nav>
    </header>

    <div class="gallery-container">
        <h1>Wedding Moments</h1>
        <div id="galleryMessage"></div>
        <div id="googleDriveGallery">
            <iframe
                src="https://drive.google.com/embeddedfolderview?id=1kUaXTyyXgR9hNK3gX8bAmHFAIfSopHsq#grid"
                class="drive-embed"
                allowfullscreen>
            </iframe>
        </div>
        <div id="adminGallery" class="admin-gallery" style="display: none;">
            <h2>Admin Uploaded Photos</h2>
            <div id="uploadedImages" class="images-grid"></div>
        </div>
    </div>

    <style>
        .admin-gallery {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 2px solid #e74c3c;
        }

        .admin-gallery h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 2rem;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .image-card {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .image-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .image-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        @media (max-width: 768px) {
            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1rem;
            }

            .image-card img {
                height: 200px;
            }
        }
    </style>

    <script>
        // Display uploaded images from admin
        function displayUploadedImages() {
            const images = JSON.parse(localStorage.getItem('adminImages')) || [];
            const uploadedImages = document.getElementById('uploadedImages');
            const adminGallery = document.getElementById('adminGallery');

            if (images.length === 0) {
                adminGallery.style.display = 'none';
                return;
            }

            adminGallery.style.display = 'block';
            uploadedImages.innerHTML = '';

            images.forEach((image) => {
                const imageCard = document.createElement('div');
                imageCard.className = 'image-card';
                imageCard.innerHTML = `
                    <img src="${image.url}" alt="Wedding Photo" onclick="openImageModal(this.src)">
                `;
                uploadedImages.appendChild(imageCard);
            });
        }

        // Open image in modal
        function openImageModal(src) {
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 999;
                padding: 2rem;
            `;
            
            modal.innerHTML = `
                <div style="position: relative; max-width: 90vw; max-height: 90vh;">
                    <img src="${src}" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                    <button onclick="this.parentElement.parentElement.remove()" style="
                        position: absolute;
                        top: -40px;
                        right: 0;
                        background: white;
                        border: none;
                        font-size: 2rem;
                        cursor: pointer;
                        color: white;
                        padding: 0;
                        width: 40px;
                        height: 40px;
                    ">×</button>
                </div>
            `;
            
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        }

        // Load images on page load
        displayUploadedImages();
    </script>
</body>
</html>
